<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - Fresh Auraa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --hero-bg: #1a1c17;
        --page-bg: #f2f2f0;
        --page-card: #ffffff;
        --text-dark: #1e211a;
        --text-soft: #6b6e65;
        --accent: #b8892f;
        --accent-dk: #8a6520;
        --text-gold: #e5d9c5;
        --font-serif: "Cinzel", serif;
        --font-sans: "Montserrat", sans-serif;
        --radius: 4px;
        --trans: 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
      }
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html { height: 100%; }
      body { font-family: var(--font-sans); min-height: 100vh; display: flex; background: var(--hero-bg); overflow: hidden; }

      .left-panel {
        width: 45%;
        background: var(--hero-bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 48px;
        position: relative;
        border-right: 1px solid rgba(229,217,197,0.1);
      }
      .left-panel::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at 30% 50%, rgba(184,137,47,0.08) 0%, transparent 65%);
        pointer-events: none;
      }
      .brand-logo { margin-bottom: 32px; }
      .brand-logo img { height: 80px; width: auto; display: block; margin: 0 auto; }
      .brand-logo .fallback { display:none; font-family:'Cinzel',serif; font-size:1.6rem; color:#e5d9c5; letter-spacing:3px; text-transform:uppercase; text-align:center; }
      .brand-tagline { text-align: center; }
      .brand-tagline .eyebrow { display: inline-flex; align-items: center; gap: 10px; color: var(--accent); font-size: 0.68rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 14px; }
      .brand-tagline .eyebrow::before, .brand-tagline .eyebrow::after { content: ""; display: block; width: 28px; height: 1px; background: var(--accent); opacity: 0.5; }
      .brand-tagline h1 { font-family: var(--font-serif); font-size: 2.2rem; font-weight: 400; color: var(--text-gold); text-transform: uppercase; letter-spacing: 2px; line-height: 1.3; margin-bottom: 16px; }
      .brand-tagline p { font-size: 0.8rem; color: rgba(229,217,197,0.45); line-height: 1.7; max-width: 300px; margin: 0 auto; letter-spacing: 0.5px; }
      .left-footer { position: absolute; bottom: 28px; font-size: 0.65rem; color: rgba(229,217,197,0.2); letter-spacing: 1px; text-transform: uppercase; }

      .right-panel { flex: 1; background: var(--page-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 56px; }

      .login-box { width: 100%; max-width: 400px; }

      .admin-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(184,137,47,0.1);
        border: 1px solid rgba(184,137,47,0.25);
        border-radius: 20px;
        padding: 5px 14px;
        font-size: 0.62rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--accent-dk);
        margin-bottom: 22px;
        font-weight: 600;
      }
      .admin-badge svg { width: 12px; height: 12px; stroke: var(--accent); fill: none; stroke-width: 2; }

      .form-header { margin-bottom: 28px; }
      .form-header .eyebrow { font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
      .form-header h2 { font-family: var(--font-serif); font-size: 1.8rem; font-weight: 400; color: var(--text-dark); text-transform: uppercase; letter-spacing: 1px; }
      .form-header p { font-size: 0.78rem; color: var(--text-soft); margin-top: 6px; line-height: 1.5; }

      .field { margin-bottom: 18px; }
      .field label { display: block; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-soft); margin-bottom: 8px; font-weight: 500; }
      .field input { width: 100%; padding: 13px 16px; background: var(--page-card); border: 1px solid #dddcd5; border-radius: var(--radius); font-family: var(--font-sans); font-size: 0.85rem; color: var(--text-dark); outline: none; transition: border-color var(--trans), box-shadow var(--trans); }
      .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(184,137,47,0.1); }
      .field input::placeholder { color: #b0afa8; }

      .pw-wrap { position: relative; }
      .pw-wrap input { padding-right: 46px; }
      .pw-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-soft); padding: 0; transition: color var(--trans); }
      .pw-toggle:hover { color: var(--accent); }

      .field-row { display: flex; justify-content: flex-end; margin-top: -8px; margin-bottom: 24px; }
      .forgot-link { font-size: 0.68rem; letter-spacing: 1px; color: var(--accent); text-decoration: none; text-transform: uppercase; transition: color var(--trans); }
      .forgot-link:hover { color: var(--accent-dk); }

      .submit-btn { width: 100%; padding: 15px; background: var(--hero-bg); border: 1px solid var(--hero-bg); border-radius: var(--radius); font-family: var(--font-serif); font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; color: var(--text-gold); cursor: pointer; transition: all var(--trans); display: flex; align-items: center; justify-content: center; gap: 10px; }
      .submit-btn:hover { background: var(--accent-dk); border-color: var(--accent-dk); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.18); }
      .submit-btn:active { transform: translateY(0); }
      .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

      .msg { display: none; padding: 12px 14px; border-radius: var(--radius); font-size: 0.75rem; letter-spacing: 0.5px; margin-bottom: 18px; line-height: 1.5; }
      .msg.error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; display: block; }
      .msg.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; display: block; }

      .back-link { display: block; text-align: center; margin-top: 24px; font-size: 0.68rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-soft); text-decoration: none; transition: color var(--trans); }
      .back-link:hover { color: var(--accent); }

      @media (max-width: 768px) {
        body { flex-direction: column; overflow: auto; }
        .left-panel { width: 100%; padding: 40px 24px; min-height: 220px; }
        .left-footer { display: none; }
        .right-panel { padding: 40px 24px; }
        .brand-tagline h1 { font-size: 1.6rem; }
      }
          @media (max-width: 768px) {
        .nav-logo { height: 65px !important; margin-top: 0 !important; }
      }
      a, .nav-logo a, nav ul li a { text-decoration: none !important; }
</style>
  </head>
  <body>
  
    <div class="left-panel">
      <div class="brand-logo">
        <img src="assets/logo5.png" alt="Fresh Auraa" onerror="this.style.display='none';this.nextElementSibling.style.display='block';" />
        <div class="fallback">Fresh Auraa</div>
      </div>
      <div class="brand-tagline">
        <div class="eyebrow">Admin Portal</div>
        <h1>Where Quality<br>Always Prevails</h1>
        <p>Manage products, orders, and customer queries from one secure dashboard.</p>
      </div>
      <div class="left-footer">© 2026 Fresh Auraa</div>
    </div>

    <div class="right-panel">
      <div class="login-box">

        <div class="admin-badge">
          <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          Admin Access Only
        </div>

        <div class="form-header">
          <div class="eyebrow">Admin Portal</div>
          <h2>Sign In</h2>
          <p>Restricted access — authorised admins only.</p>
        </div>

        <div class="msg" id="msgBox"></div>

        <form onsubmit="handleLogin(event)">
          <div class="field">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="admin@freshauraa.com" required autocomplete="email" />
          </div>

          <div class="field">
            <label for="password">Password</label>
            <div class="pw-wrap">
              <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" />
              <button type="button" class="pw-toggle" onclick="togglePw()" aria-label="Toggle password">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="eyeIcon">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="field-row">
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="submit-btn" id="submitBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            <span id="btnText">Access Dashboard</span>
          </button>
        </form>

        <a href="c.html" class="back-link">← Back to Website</a>

      </div>
    </div>

    <script>
      // Check if already logged in
      if (localStorage.getItem("token")) {
        window.location.href = "adminDashboard.html";
      }

      async function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const msgBox = document.getElementById('msgBox');

        msgBox.className = 'msg';
        btn.disabled = true;
        btnText.textContent = 'Signing in…';

        try {
          const res = await fetch('http://localhost:3000/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });

          const data = await res.json();

          if (res.ok) {
            if (data.token) localStorage.setItem('token', data.token);
            msgBox.textContent = 'Login successful! Redirecting to dashboard…';
            msgBox.className = 'msg success';
            setTimeout(() => { window.location.href = 'adminDashboard.html'; }, 1200);
          } else {
            msgBox.textContent = data.message || 'Invalid credentials. Please try again.';
            msgBox.className = 'msg error';
            btn.disabled = false;
            btnText.textContent = 'Access Dashboard';
          }
        } catch (err) {
          msgBox.textContent = 'Could not connect to server. Please try again.';
          msgBox.className = 'msg error';
          btn.disabled = false;
          btnText.textContent = 'Access Dashboard';
        }
      }

      function togglePw() {
        const input = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (input.type === 'password') {
          input.type = 'text';
          icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
        } else {
          input.type = 'password';
          icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        }
      }
    </script>
      <!-- WhatsApp Floating Icon -->
    <a href="https://wa.me/" target="_blank" style="position: fixed; bottom: 30px; right: 30px; z-index: 9999; font-size: 45px; text-decoration: none; line-height: 1; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); transition: transform 0.3s ease;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
      <i class="fa-brands fa-square-whatsapp fa-beat fa-sm fa-width-auto" style="color: #24cc63;"></i>
    </a>
</body>
</html>
